<svg width="100%" viewBox="0 0 680 920">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Zone labels (left margin) ── -->
  <text class="ts" x="36" y="108" text-anchor="middle" transform="rotate(-90,36,108)" style="letter-spacing:0.05em">USER</text>
  <text class="ts" x="36" y="292" text-anchor="middle" transform="rotate(-90,36,292)" style="letter-spacing:0.05em">CLI</text>
  <text class="ts" x="36" y="500" text-anchor="middle" transform="rotate(-90,36,500)" style="letter-spacing:0.05em">LOCAL</text>
  <text class="ts" x="36" y="696" text-anchor="middle" transform="rotate(-90,36,696)" style="letter-spacing:0.05em">LINGO.DEV</text>
  <text class="ts" x="36" y="860" text-anchor="middle" transform="rotate(-90,36,860)" style="letter-spacing:0.05em">OUTPUT</text>

  <!-- ── Zone dividers ── -->
  <line x1="56" y1="160" x2="640" y2="160" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="56" y1="360" x2="640" y2="360" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="56" y1="620" x2="640" y2="620" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="56" y1="780" x2="640" y2="780" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- ════════════════ ROW 1 — USER ════════════════ -->
  <g class="node c-gray" onclick="sendPrompt('What inputs does the skill-i18n CLI accept?')">
    <rect x="220" y="56" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="78" text-anchor="middle" dominant-baseline="central">Run translate command</text>
    <text class="ts" x="340" y="98" text-anchor="middle" dominant-baseline="central">repo path · target locale · engine ID</text>
  </g>

  <!-- ════════════════ ROW 2 — CLI ════════════════ -->
  <!-- arrow down -->
  <line x1="340" y1="112" x2="340" y2="176" class="arr" marker-end="url(#arrow)"/>

  <!-- Validate + Discover side by side -->
  <g class="node c-purple" onclick="sendPrompt('How does skill-i18n validate the locale and API key?')">
    <rect x="80" y="176" width="180" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="170" y="198" text-anchor="middle" dominant-baseline="central">Validate</text>
    <text class="ts" x="170" y="218" text-anchor="middle" dominant-baseline="central">locale · API key check</text>
  </g>

  <g class="node c-purple" onclick="sendPrompt('How does skill-i18n discover SKILL.md files?')">
    <rect x="420" y="176" width="180" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="510" y="198" text-anchor="middle" dominant-baseline="central">Discover skills</text>
    <text class="ts" x="510" y="218" text-anchor="middle" dominant-baseline="central">walks repo, finds SKILL.md</text>
  </g>

  <!-- arrow splits to both boxes -->
  <path d="M340 176 L170 176" fill="none" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-secondary)"/>
  <path d="M340 176 L510 176" fill="none" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-secondary)"/>

  <!-- both merge back to parse -->
  <path d="M170 232 L170 318 L340 318" fill="none" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-secondary)"/>
  <path d="M510 232 L510 318 L340 318" fill="none" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-secondary)"/>

  <g class="node c-purple" onclick="sendPrompt('How does skill-i18n parse a SKILL.md file?')">
    <rect x="220" y="290" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="312" text-anchor="middle" dominant-baseline="central">Parse each SKILL.md</text>
    <text class="ts" x="340" y="332" text-anchor="middle" dominant-baseline="central">frontmatter · body · protect code blocks</text>
  </g>

  <!-- ════════════════ ROW 3 — LOCAL ════════════════ -->
  <line x1="340" y1="346" x2="340" y2="388" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-teal" onclick="sendPrompt('How does skill-i18n assemble the translation payload?')">
    <rect x="220" y="388" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="410" text-anchor="middle" dominant-baseline="central">Build flat payload</text>
    <text class="ts" x="340" y="430" text-anchor="middle" dominant-baseline="central">name · description · __body__</text>
  </g>

  <line x1="340" y1="444" x2="340" y2="486" class="arr" marker-end="url(#arrow)"/>

  <!-- Concurrency box (slightly wider) -->
  <g class="node c-teal" onclick="sendPrompt('How does concurrency work in skill-i18n?')">
    <rect x="185" y="486" width="310" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="508" text-anchor="middle" dominant-baseline="central">Dispatch async tasks</text>
    <text class="ts" x="340" y="528" text-anchor="middle" dominant-baseline="central">semaphore · up to 3 skills in parallel</text>
  </g>

  <line x1="340" y1="542" x2="340" y2="584" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-teal" onclick="sendPrompt('What does POST /process/localize send to the Lingo.dev API?')">
    <rect x="185" y="584" width="310" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="606" text-anchor="middle" dominant-baseline="central">POST /process/localize</text>
  </g>

  <!-- ════════════════ ROW 4 — LINGO.DEV ════════════════ -->
  <line x1="340" y1="620" x2="340" y2="648" class="arr" marker-end="url(#arrow)"/>

  <!-- Engine pipeline: 5 steps in a horizontal strip -->
  <!-- step boxes: x=68 w=100, gap=12 → 5×100+4×12=548; leftmost x=68 rightmost edge=616 -->
  <g class="node c-coral" onclick="sendPrompt('How does Lingo.dev select an LLM model?')">
    <rect x="68" y="648" width="100" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="118" y="668" text-anchor="middle" dominant-baseline="central">Model</text>
    <text class="ts" x="118" y="686" text-anchor="middle" dominant-baseline="central">per-locale LLM</text>
  </g>
  <line x1="168" y1="676" x2="180" y2="676" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-coral" onclick="sendPrompt('How does Lingo.dev Brand Voice work?')">
    <rect x="180" y="648" width="100" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="230" y="668" text-anchor="middle" dominant-baseline="central">Brand voice</text>
    <text class="ts" x="230" y="686" text-anchor="middle" dominant-baseline="central">tone · formality</text>
  </g>
  <line x1="280" y1="676" x2="292" y2="676" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-coral" onclick="sendPrompt('What are Lingo.dev Instructions?')">
    <rect x="292" y="648" width="100" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="342" y="668" text-anchor="middle" dominant-baseline="central">Instructions</text>
    <text class="ts" x="342" y="686" text-anchor="middle" dominant-baseline="central">locale rules</text>
  </g>
  <line x1="392" y1="676" x2="404" y2="676" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-coral" onclick="sendPrompt('How does the Lingo.dev Glossary prevent mistranslation of technical terms?')">
    <rect x="404" y="648" width="100" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="454" y="668" text-anchor="middle" dominant-baseline="central">Glossary</text>
    <text class="ts" x="454" y="686" text-anchor="middle" dominant-baseline="central">term lock / skip</text>
  </g>
  <line x1="504" y1="676" x2="516" y2="676" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-coral" onclick="sendPrompt('How does Lingo.dev generate the final translation?')">
    <rect x="516" y="648" width="100" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="566" y="668" text-anchor="middle" dominant-baseline="central">Generate</text>
    <text class="ts" x="566" y="686" text-anchor="middle" dominant-baseline="central">LLM · JSON out</text>
  </g>

  <!-- API returns -->
  <line x1="340" y1="704" x2="340" y2="740" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-teal" onclick="sendPrompt('What does the Lingo.dev API response look like?')">
    <rect x="185" y="740" width="310" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="762" text-anchor="middle" dominant-baseline="central">API response · translated data{}</text>
  </g>

  <!-- ════════════════ ROW 5 — OUTPUT ════════════════ -->
  <line x1="340" y1="776" x2="340" y2="800" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-green" onclick="sendPrompt('How does skill-i18n reassemble the translated SKILL.md?')">
    <rect x="185" y="800" width="310" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="822" text-anchor="middle" dominant-baseline="central">Reassemble SKILL.md</text>
    <text class="ts" x="340" y="842" text-anchor="middle" dominant-baseline="central">restore code blocks · render frontmatter</text>
  </g>

  <line x1="340" y1="856" x2="340" y2="876" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-green" onclick="sendPrompt('What does the output directory structure look like?')">
    <rect x="220" y="876" width="240" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="898" text-anchor="middle" dominant-baseline="central">Write i18n/de/skill/SKILL.md</text>
  </g>
</svg>